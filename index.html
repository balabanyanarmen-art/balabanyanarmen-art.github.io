<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armen Balabanyan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: white;
            color: black;
            font-family: 'Bowlby One', sans-serif;
        }

        .container {
            display: flex;
            gap: 80px;
            align-items: flex-start;
        }

        .left {
            width: 30%;
            position: sticky;
            top: 40px;
        }

        .right {
            width: 70%;
        }

        .title {
            font-size: 18px;
            line-height: 1.2;
            margin-bottom: 40px;
            cursor: pointer;
            text-transform: lowercase;
        }

        .menu-item {
            font-size: 18px;
            line-height: 1.2;
            margin-bottom: 14px;
            cursor: pointer;
            text-transform: lowercase;
        }

        .active {
            text-transform: uppercase;
        }

        .content {
            display: none;
            font-size: 18px;
            line-height: 1.5;
            text-transform: lowercase;
        }

        .content.active {
            display: block;
        }

        .work-item {
            margin-bottom: 25px;
        }

        .work-title {
            cursor: pointer;
            display: inline-block;
            margin-bottom: 10px;
        }
.slider-window {
    display: none; /* Սկզբում թաքնված */
    width: 100%;
    max-width: 500px; /* Սա առավելագույն լայնությունն է */
    margin-top: 15px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    position: relative;
    /* Հեռացրել ենք ֆիքսված height-ը */
}

.slider-window.open {
    display: flex;
}

.slider-window img {
    max-height: 500px;
    width: 100%; /* Նկարը կզբաղեցնի պատուհանի ամբողջ լայնությունը */
    height: auto; /* Բարձրությունը կհարմարվի նկարի համամասնությանը */
    display: block;
    flex-shrink: 0;
    scroll-snap-align: center;
    object-fit: contain;
}
}

}
        /* Թաքցնել scrollbar-ը */
        .slider-window::-webkit-scrollbar {
            display: none;
        }

        .slider-info {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.5;
            display: none;
        }

        .slider-window.open + .slider-info {
            display: block;
        }

        @media(max-width: 900px) {
            .container { flex-direction: column; gap: 40px; }
            .left, .right { width: 100%; }
            .slider-window { height: 300px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <div class="title" onclick="goHome()">armen balabanyan</div>
        <div class="menu-item" onclick="showContent('visual', this)">visual stories</div>
        <div class="menu-item" onclick="showContent('shadow', this)">shadow theatre</div>
        <div class="menu-item" onclick="showContent('other', this)">other</div>
        <div class="menu-item" onclick="showContent('bio', this)">biography</div>
        <div class="menu-item" onclick="showContent('contact', this)">contact</div>
    </div>

    <div class="right">
        <div id="visual" class="content">
            <div class="work-item">
                <div class="work-title" onclick="toggleSlider('hh-slider')">HH</div>
                <div id="hh-slider" class="slider-window">
                    <img src="hh/hh1.jpg" alt="1">
                    <img src="hh/hh2.jpg" alt="2">
                    <img src="hh/hh3.jpg" alt="3">
                    <img src="hh/hh4.jpg" alt="3">
                    <img src="hh/hh5.jpg" alt="3">
                    <img src="hh/hh6.jpg" alt="3"> 
                    <img src="hh/hh7.jpg" alt="3">
                </div>
                <div class="slider-info"> ←  → </div>
            </div>

            <div class="work-item">
                <div class="work-title" onclick="toggleSlider('ban-slider')">BAN</div>
                <div id="ban-slider" class="slider-window">
                    <img src="images/ban1.jpg" alt="1">
                    <img src="images/ban2.jpg" alt="2">
                </div>
                <div class="slider-info">← սահեցրեք թերթելու համար →</div>
            </div>
        </div>

        <div id="bio" class="content">
            visual storyteller, actor and shadow theatre artist based in armenia.
        </div>

        <div id="contact" class="content">
            <a href="mailto:email@example.com" style="color:black; text-decoration:none;">email ↗</a>
        </div>
    </div>
</div>

<script>
    function showContent(id, element) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        element.classList.add('active');
    }

    function toggleSlider(id) {
        const slider = document.getElementById(id);
        const isOpen = slider.classList.contains('open');
        
        // Փակել բոլոր սլայդերները նախքան նորը բացելը
        document.querySelectorAll('.slider-window').forEach(s => s.classList.remove('open'));
        
        if (!isOpen) {
            slider.classList.add('open');
        }
    }

    function goHome() {
        document.querySelectorAll('.content, .menu-item, .slider-window').forEach(el => el.classList.remove('active', 'open'));
    }
</script>

</body>
</html>
