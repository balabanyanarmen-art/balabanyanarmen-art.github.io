<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armen Balabanyan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: white;
            color: black;
            font-family: 'Bowlby One', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .container { display: flex; gap: 80px; align-items: flex-start; }
        .left { width: 30%; position: sticky; top: 40px; }
        .right { width: 70%; }

        .title { font-size: 18px; margin-bottom: 40px; cursor: pointer; text-transform: lowercase; }
        .menu-item { font-size: 18px; margin-bottom: 14px; cursor: pointer; text-transform: lowercase; transition: opacity 0.3s; }
        .menu-item.active { text-transform: uppercase; }

        .content { display: none; font-size: 18px; line-height: 1.5; text-transform: lowercase; }
        .content.active { display: block; }

        .work-item { margin-bottom: 25px; }
        .work-title { cursor: pointer; display: inline-block; margin-bottom: 10px; border-bottom: 1px solid transparent; }
        .work-title:hover { border-bottom: 1px solid currentColor; }

        /* Սլայդերների ոճը */
        .slider-window {
            display: none; /* Սկզբից թաքնված */
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            border: none;
            background: transparent;
        }

        .slider-window.open { display: flex !important; }

        .slider-window img {
            max-height: 500px;
            width: auto;
            flex-shrink: 0;
            scroll-snap-align: center;
            object-fit: contain;
            background: transparent;
            margin-right: 15px;
        }

        .slider-window::-webkit-scrollbar { display: none; }

        .slider-info { font-size: 12px; margin-top: 5px; opacity: 0.5; display: none; }
        .slider-window.open + .slider-info { display: block; }

        /* Dark Mode */
        body.dark-mode { background-color: black; color: white; }
        body.dark-mode .menu-item, body.dark-mode .title, body.dark-mode .work-title { color: white; }

        @media(max-width: 900px) { .container { flex-direction: column; } .left, .right { width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <div class="title" onclick="goHome()">armen balabanyan</div>
        <div class="menu-item" onclick="showContent('visual', this)">visual stories</div>
        <div class="menu-item" onclick="showContent('shadow', this)">shadow theatre</div>
        <div class="menu-item" onclick="showContent('bio', this)">biography</div>
        <div class="menu-item" onclick="showContent('contact', this)">contact</div>
    </div>

    <div class="right">
        <div id="visual" class="content">
            <div class="work-item">
                <div class="work-title" onclick="toggleGenericSlider('b-slider')">ban</div>
                <div id="b-slider" class="slider-window">
                    <img src="images/b1.jpg" alt="1"><img src="images/b2.jpg" alt="2"><img src="images/b3.jpg" alt="3">
                </div>
                <div class="slider-info">← swipe to view →</div>
            </div>
        </div>

        <div id="shadow" class="content">
            <div class="work-item">
                <div class="work-title" onclick="toggleEnkiMaster()">enki</div>
                
                <div id="enki-details" style="display: none; margin-top: 20px;">
                    <p style="font-size: 14px; opacity: 0.8; max-width: 600px; margin-bottom: 30px;">
                        “Enki” was my first collaborative shadow theatre project...
                    </p>

                    <div class="work-item" style="margin-left: 20px;">
                        <div class="work-title" onclick="toggleGenericSlider('push-s')">“Push”</div>
                        <div id="push-s" class="slider-window">
                            <img src="push/poster.jpg" alt="1"><img src="push/image1.jpg" alt="2">
                        </div>
                        <div class="slider-info">Lusik Aguletsi House-Museum</div>
                    </div>

                    <div class="work-item" style="margin-left: 20px; margin-top: 20px;">
                        <div class="work-title" onclick="toggleGenericSlider('gikor-s')">“Gikor’s Dream”</div>
                        <div id="gikor-s" class="slider-window">
                            <img src="gikor/poster.jpg" alt="1"><img src="gikor/image1.jpg" alt="2">
                        </div>
                        <div class="slider-info">Yeghishe Charents House-Museum</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="bio" class="content">visual storyteller, actor and artist.</div>
        <div id="contact" class="content"><a href="mailto:email@example.com" style="color:inherit; text-decoration:none;">email ↗</a></div>
    </div>
</div>

<script>
    function showContent(id, element) {
        // Թաքցնել ամեն ինչ
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.slider-window').forEach(s => s.classList.remove('open'));
        document.getElementById('enki-details').style.display = 'none';

        // Ակտիվացնել ընտրվածը
        document.getElementById(id).classList.add('active');
        element.classList.add('active');

        // Dark Mode
        if (id === 'shadow') document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
    }

    // Ընդհանուր ֆունկցիա ցանկացած սլայդերի համար
    function toggleGenericSlider(id) {
        const slider = document.getElementById(id);
        const isOpen = slider.classList.contains('open');
        
        // Փակել նույն մակարդակի սլայդերները (ըստ ցանկության)
        // document.querySelectorAll('.slider-window').forEach(s => s.classList.remove('open'));

        if (!isOpen) slider.classList.add('open');
        else slider.classList.remove('open');
    }

    // Հատուկ Enki-ի համար
    function toggleEnkiMaster() {
        const details = document.getElementById('enki-details');
        if (details.style.display === 'none') {
            details.style.display = 'block';
        } else {
            details.style.display = 'none';
            // Երբ Enki-ն փակվում է, փակել նաև իր ներսի սլայդերները
            details.querySelectorAll('.slider-window').forEach(s => s.classList.remove('open'));
        }
    }

    function goHome() {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.body.classList.remove('dark-mode');
    }
</script>
</body>
</html>
