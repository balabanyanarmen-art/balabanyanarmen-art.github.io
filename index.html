<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armen Balabanyan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: white;
            color: black;
            font-family: 'Bowlby One', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .container { display: flex; gap: 80px; align-items: flex-start; }
        .left { width: 30%; position: sticky; top: 40px; }
        .right { width: 70%; }

        .title { font-size: 18px; line-height: 1.2; margin-bottom: 40px; cursor: pointer; text-transform: lowercase; }
        .menu-item { font-size: 18px; line-height: 1.2; margin-bottom: 14px; cursor: pointer; text-transform: lowercase; transition: opacity 0.3s; }
        .menu-item:hover { opacity: 0.5; }
        .menu-item.active { text-transform: uppercase; }

        .content { display: none; font-size: 18px; line-height: 1.5; text-transform: lowercase; }
        .content.active { display: block; }

        .work-item { margin-bottom: 25px; }
        .work-title { cursor: pointer; display: inline-block; margin-bottom: 10px; border-bottom: 1px solid transparent; }
        .work-title:hover { border-bottom: 1px solid currentColor; }

        /* Սլայդերների ոճը */
        .slider-window {
            display: none;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border: none;
            background: transparent;
        }

        /* ԿԱՐԵՎՈՐ. Shadow-ի ներսի սլայդերները ՄԻՇՏ բաց են լինում */
        #shadow .slider-window { display: flex !important; }
        
        .slider-window.open { display: flex; }

        .slider-window img {
            max-height: 500px;
            width: auto; /* Հանում է սպիտակ կողքերը */
            display: block;
            flex-shrink: 0;
            scroll-snap-align: center;
            object-fit: contain;
            background: transparent;
            margin-right: 15px;
        }

        .slider-window::-webkit-scrollbar { display: none; }

        .slider-info { font-size: 12px; margin-top: 5px; opacity: 0.5; display: none; max-width: 500px; }
        
        /* Ցույց տալ ինֆոն Shadow-ում և բացված սլայդերներում */
        #shadow .slider-info, .slider-window.open + .slider-info { display: block; }

        @media(max-width: 900px) {
            .container { flex-direction: column; gap: 40px; }
            .left, .right { width: 100%; }
        }

        body.dark-mode { background-color: black; color: white; }
        body.dark-mode a, body.dark-mode .menu-item, body.dark-mode .title, body.dark-mode .work-title { color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <div class="title" onclick="goHome()">armen balabanyan</div>
        <div class="menu-item" onclick="showContent('visual', this)">visual stories</div>
        <div class="menu-item" onclick="showContent('shadow', this)">shadow theatre</div>
        <div class="menu-item" onclick="showContent('other', this)">other</div>
        <div class="menu-item" onclick="showContent('bio', this)">biography</div>
        <div class="menu-item" onclick="showContent('contact', this)">contact</div>
    </div>

    <div class="right">
        <div id="visual" class="content">
             <div class="work-item">
                <div class="work-title" onclick="toggleSlider('b-slider')">ban</div>
                <div id="b-slider" class="slider-window">
                    <img src="images/b1.jpg" alt="1"><img src="images/b2.jpg" alt="2"><img src="images/b3.jpg" alt="3"><img src="images/b4.jpg" alt="4"><img src="images/b5.jpg" alt="5"><img src="images/b6.jpg" alt="6"><img src="images/b7.jpg" alt="7"><img src="images/b8.jpg" alt="8"><img src="images/b9.jpg" alt="9"><img src="images/b10.jpg" alt="10"><img src="images/b11.jpg" alt="11"><img src="images/b12.jpg" alt="12"><img src="images/b13.jpg" alt="13"><img src="images/b14.jpg" alt="14"><img src="images/b15.jpg" alt="15"><img src="images/b16.jpg" alt="16">
                </div>
                <div class="slider-info">← swipe to view →</div>
            </div>
            
            <div class="work-item">
                <div class="work-title" onclick="toggleSlider('a-slider')">22:1-12</div>
                <div id="a-slider" class="slider-window">
                    <img src="images/a1.jpg" alt="1"><img src="images/a2.jpg" alt="2"><img src="images/a3.jpg" alt="3"><img src="images/a4.jpg" alt="4">
                </div>
                <div class="slider-info">← swipe to view →</div>
            </div>
            
            <div class="work-item">
                <div class="work-title" onclick="toggleSlider('i-slider')">the illuminator</div>
                <div id="i-slider" class="slider-window">
                    <img src="images/i1.jpg" alt="1"><img src="images/i2.jpg" alt="2"><img src="images/i3.jpg" alt="3"><img src="images/i4.jpg" alt="4"><img src="images/i5.jpg" alt="5"><img src="images/i6.jpg" alt="6"><img src="images/i7.jpg" alt="7"><img src="images/i8.jpg" alt="8"><img src="images/i9.jpg" alt="9">
                </div>
                <div class="slider-info">← swipe to view →</div>
            </div>
        </div>

        <div id="shadow" class="content">
            <div class="work-item">
                <div class="work-title" onclick="toggleEnkiDetails()">enki</div>
                <div id="enki-details" style="display: none; margin-top: 20px;">
                    <div class="slider-info" style="display:block; margin-bottom: 30px; max-width: 600px; color: inherit; opacity: 1;">
                        “Enki” was my first collaborative shadow theatre project... [քո տեքստը]
                    </div>

                    <div class="work-item" style="margin-left: 20px;">
                        <div class="slider-info" style="display:block; text-transform: uppercase; color: inherit;">“Push”</div>
                        <div class="slider-window">
                            <img src="push/poster.jpg" alt="1"><img src="push/image1.jpg" alt="2"><img src="push/image2.jpg" alt="3"><img src="push/image3.jpg" alt="4"><img src="push/image4.jpg" alt="5">
                        </div>
                    </div>

                    <div class="work-item" style="margin-left: 20px; margin-top: 30px;">
                        <div class="slider-info" style="display:block; text-transform: uppercase; color: inherit;">“Gikor’s Dream”</div>
                        <div class="slider-window">
                            <img src="gikor/poster.jpg" alt="1"><img src="gikor/image1.jpg" alt="2"><img src="gikor/image2.jpg" alt="3"><img src="gikor/image3.jpg" alt="4"><img src="gikor/image4.jpg" alt="5">
                        </div>
                    </div>
                </div> 
            </div>
        </div>
    </div>
</div>

<script>
    function showContent(id, element) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        element.classList.add('active');

        if (id === 'shadow') document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
        
        // ՉԵՆՔ ջնջում enki-details-ը այստեղ, որ չկորչի
    }

    function toggleSlider(id) {
        const slider = document.getElementById(id);
        const isOpen = slider.classList.contains('open');
        // Փակում ենք ՄԻԱՅՆ Visual բաժնի սլայդերները
        document.querySelectorAll('#visual .slider-window').forEach(s => s.classList.remove('open'));
        if (!isOpen) slider.classList.add('open');
    }

    function toggleEnkiDetails() {
        const details = document.getElementById('enki-details');
        details.style.display = (details.style.display === 'none') ? 'block' : 'none';
    }

    function goHome() {
        document.querySelectorAll('.content, .menu-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.slider-window').forEach(s => s.classList.remove('open'));
        document.body.classList.remove('dark-mode');
        document.getElementById('enki-details').style.display = 'none';
    }
</script>
</body>
</html>
